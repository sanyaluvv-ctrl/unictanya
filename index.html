            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: 50px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #999;
        }

</head>
<body>
    <div class="card">

</html>
